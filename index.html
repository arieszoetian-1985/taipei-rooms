<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>台北日系精緻公寓｜Taipei Minimal Stay｜台北ミニマルステイ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#7a9e7e;--sage-light:#e8f0e9;--sage-dark:#4a7a4e;
  --ink:#2c2c2c;--ink-soft:#5a5a5a;
  --cream:#f9f7f4;--white:#fff;
  --border:rgba(0,0,0,0.1);--radius:12px;
}
html{scroll-behavior:smooth;color-scheme:light}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
body.lang-ja{font-family:'Noto Sans JP',sans-serif}

/* ── save bar ── */
#save-bar{position:sticky;top:0;z-index:100;background:rgba(249,247,244,0.93);backdrop-filter:blur(8px);border-bottom:0.5px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
#save-bar p{font-size:12px;color:var(--ink-soft);line-height:1.5}
#save-bar strong{color:var(--ink);font-weight:500}
.save-btn{background:var(--sage);color:#fff;font-family:inherit;font-size:12px;padding:8px 20px;border-radius:20px;border:none;cursor:pointer;white-space:nowrap;transition:background 0.2s;flex-shrink:0}
.save-btn:hover{background:#6a8e6e}
.save-btn:disabled{background:#aaa;cursor:default}

/* ── lang bar ── */
#lang-bar{display:flex;justify-content:flex-end;gap:4px;padding:12px 24px 0}
.lang-btn{font-size:11px;letter-spacing:1px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--ink-soft);transition:all 0.18s;font-family:inherit}
.lang-btn:hover{border-color:var(--sage);color:var(--sage)}
.lang-btn.active{background:var(--sage);color:#fff;border-color:var(--sage)}

/* ── layout ── */
.site-wrap{max-width:900px;margin:0 auto;padding:0 0 80px}
.hero{text-align:center;padding:44px 24px 36px;border-bottom:0.5px solid var(--border);margin-bottom:44px}
.hero-tag{display:inline-block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--sage);border:0.5px solid var(--sage);padding:4px 12px;border-radius:20px;margin-bottom:18px}
.hero h1{font-family:'Noto Serif TC',serif;font-size:30px;font-weight:300;line-height:1.65;margin-bottom:14px}
body.lang-ja .hero h1{font-family:'Noto Serif JP',serif}
.hero p{font-size:13px;color:var(--ink-soft);line-height:1.9;max-width:460px;margin:0 auto}
.features{display:flex;justify-content:center;gap:28px;padding:0 24px 44px;flex-wrap:wrap;border-bottom:0.5px solid var(--border);margin-bottom:44px}
.feat{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-soft)}
.feat-dot{width:7px;height:7px;border-radius:50%;background:var(--sage);flex-shrink:0}
.section-block{margin-bottom:52px;padding:0 24px}
.section-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--sage);margin-bottom:4px}
.section-title{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:300;margin-bottom:6px}
body.lang-ja .section-title{font-family:'Noto Serif JP',serif}
.section-sub{font-size:12px;color:var(--ink-soft);margin-bottom:22px;line-height:1.7}
.subsection-head{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin:28px 0 12px;padding-bottom:8px;border-bottom:0.5px solid var(--border)}
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.shared-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px}

/* ── photo slot (cover) ── */
.room-card{background:var(--white);border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden;transition:transform 0.18s}
.room-card:hover{transform:translateY(-2px)}

.cover-zone{position:relative;width:100%;aspect-ratio:4/3;background:var(--sage-light);overflow:hidden;cursor:pointer}
.cover-zone img.cover-img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 0.3s}
.cover-zone img.cover-img.loaded{opacity:1}

/* empty state */
.cover-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;pointer-events:none}
.cover-zone.has-photos .cover-empty{display:none}
.upload-icon{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--sage);display:flex;align-items:center;justify-content:center;color:var(--sage);font-size:16px;line-height:1}
.upload-text{font-size:10px;color:var(--sage);letter-spacing:0.5px}

/* hover overlay */
.cover-hover{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;gap:10px;opacity:0;transition:all 0.2s;z-index:2}
.cover-zone.has-photos:hover .cover-hover{opacity:1;background:rgba(0,0,0,0.32)}
.cover-zone:not(.has-photos):hover .cover-hover{opacity:1;background:rgba(0,0,0,0.06)}
.cover-hover .btn-upload{font-size:11px;color:#fff;border:0.5px solid rgba(255,255,255,0.85);padding:5px 13px;border-radius:20px;background:transparent;cursor:pointer;font-family:inherit;transition:background 0.15s}
.cover-hover .btn-upload:hover{background:rgba(255,255,255,0.15)}
.cover-hover .btn-view{font-size:11px;color:#fff;border:0.5px solid rgba(255,255,255,0.85);padding:5px 13px;border-radius:20px;background:transparent;cursor:pointer;font-family:inherit;transition:background 0.15s}
.cover-hover .btn-view:hover{background:rgba(255,255,255,0.15)}

/* photo count badge */
.photo-count{position:absolute;top:7px;right:7px;background:rgba(0,0,0,0.45);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;display:none;z-index:3;pointer-events:none}
.cover-zone.has-photos .photo-count{display:block}

input[type="file"]{display:none}
.room-info{padding:12px 14px}
.room-name{font-size:13px;font-weight:500;margin-bottom:3px}
.room-meta{font-size:11px;color:var(--ink-soft);line-height:1.7}
.bed-badge{display:inline-block;font-size:10px;color:var(--sage);background:var(--sage-light);padding:2px 8px;border-radius:10px;margin-top:4px}

/* ── shared card ── */
.shared-card{background:var(--white);border-radius:10px;border:0.5px solid var(--border);overflow:hidden}
.shared-cover{position:relative;width:100%;aspect-ratio:1/1;background:#f0ede8;overflow:hidden;cursor:pointer}
.shared-cover img.cover-img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity 0.3s}
.shared-cover img.cover-img.loaded{opacity:1}
.shared-cover .cover-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;pointer-events:none}
.shared-cover.has-photos .cover-empty{display:none}
.shared-cover .upload-icon{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--sage);display:flex;align-items:center;justify-content:center;color:var(--sage);font-size:13px;line-height:1}
.shared-cover .upload-text{font-size:9px;color:var(--sage)}
.shared-cover .cover-hover{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;gap:6px;opacity:0;transition:all 0.2s;z-index:2}
.shared-cover.has-photos:hover .cover-hover{opacity:1;background:rgba(0,0,0,0.32)}
.shared-cover:not(.has-photos):hover .cover-hover{opacity:1;background:rgba(0,0,0,0.06)}
.shared-cover .cover-hover .btn-upload,.shared-cover .cover-hover .btn-view{font-size:10px;color:#fff;border:0.5px solid rgba(255,255,255,0.85);padding:4px 10px;border-radius:20px;background:transparent;cursor:pointer;font-family:inherit}
.shared-cover .photo-count{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.45);color:#fff;font-size:9px;padding:2px 6px;border-radius:8px;display:none;z-index:3;pointer-events:none}
.shared-cover.has-photos .photo-count{display:block}
.shared-label{padding:8px 10px;font-size:11px;font-weight:500}

/* ── LIGHTBOX ── */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center}
#lightbox.open{display:flex}
#lb-title{color:rgba(255,255,255,0.7);font-size:12px;letter-spacing:1px;position:absolute;top:16px;left:50%;transform:translateX(-50%);white-space:nowrap}
#lb-close{position:absolute;top:14px;right:18px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;line-height:1;opacity:0.75;transition:opacity 0.15s}
#lb-close:hover{opacity:1}
#lb-img-wrap{position:relative;max-width:90vw;max-height:80vh;display:flex;align-items:center;justify-content:center}
#lb-img{max-width:90vw;max-height:78vh;object-fit:contain;border-radius:6px;display:block}
#lb-prev,#lb-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.12);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;z-index:2}
#lb-prev{left:-52px}#lb-next{right:-52px}
#lb-prev:hover,#lb-next:hover{background:rgba(255,255,255,0.25)}
#lb-counter{color:rgba(255,255,255,0.55);font-size:11px;margin-top:12px}
#lb-dots{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;justify-content:center;max-width:90vw}
.lb-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.35);border:none;cursor:pointer;padding:0;transition:background 0.15s}
.lb-dot.active{background:#fff}
#lb-add{margin-top:14px;font-size:11px;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.25);padding:6px 16px;border-radius:20px;cursor:pointer;font-family:inherit;transition:all 0.15s}
#lb-add:hover{background:rgba(255,255,255,0.18);color:#fff}
@media(max-width:600px){
  #lb-prev{left:-36px;width:32px;height:32px;font-size:18px}
  #lb-next{right:-36px;width:32px;height:32px;font-size:18px}
}

.notice-bar{background:var(--sage-light);border-radius:8px;border:0.5px solid var(--sage);padding:10px 14px;font-size:12px;color:var(--sage-dark);line-height:1.7;margin-bottom:22px;display:flex;gap:8px;align-items:flex-start}
.notice-bar::before{content:"ℹ";font-size:13px;flex-shrink:0;margin-top:1px}
.divider{height:0.5px;background:var(--border);margin:0 24px 44px}
.cta-block{margin:0 24px;background:var(--white);border-radius:var(--radius);border:0.5px solid var(--border);padding:32px 28px;display:flex;align-items:center;justify-content:center;text-align:center}
.cta-text h3{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:300}
body.lang-ja .cta-text h3{font-family:'Noto Serif JP',serif}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;font-size:12px;padding:10px 20px;border-radius:24px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:600;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){
  .hero h1{font-size:24px}
  .rooms-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .shared-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  #save-bar{flex-direction:column;align-items:flex-start}
  #lang-bar{padding:10px 16px 0}
}
</style>
</head>

const metaNames={zh:{one:'1人入住 · 雅房',two:'1–2人入住 · 雅房'},en:{one:'1 guest · Private room',two:'1–2 guests · Private room'},ja:{one:'1名 · 個室',two:'1–2名 · 個室'}};
const roomNames={zh:['忠孝復興 A 室','忠孝復興 B 室','忠孝復興 C 室','忠孝復興 D 室','永春站 A 室','永春站 B 室'],en:['Zhongxiao Fuxing — Room A','Zhongxiao Fuxing — Room B','Zhongxiao Fuxing — Room C','Zhongxiao Fuxing — Room D','Yongchun — Room A','Yongchun — Room B'],ja:['忠孝復興 Aルーム','忠孝復興 Bルーム','忠孝復興 Cルーム','忠孝復興 Dルーム','永春 Aルーム','永春 Bルーム']};
const sharedNames={zh:{bath1:'衛浴一',bath2:'衛浴二',bathYC:'衛浴',entry:'玄關',living:'客廳',dining:'餐廳',kitchen:'廚房',laundry:'洗衣間'},en:{bath1:'Bathroom 1',bath2:'Bathroom 2',bathYC:'Bathroom',entry:'Entrance',living:'Living Room',dining:'Dining Room',kitchen:'Kitchen',laundry:'Laundry'},ja:{bath1:'バスルーム①',bath2:'バスルーム②',bathYC:'バスルーム',entry:'玄関',living:'リビング',dining:'ダイニング',kitchen:'キッチン',laundry:'ランドリー'}};

const zxRoomDefs=[{id:'zxa',bed:'single',meta:'one'},{id:'zxb',bed:'single',meta:'one'},{id:'zxc',bed:'double',meta:'two'},{id:'zxd',bed:'largeSingle',meta:'one'}];
const ycRoomDefs=[{id:'yca',bed:'single',meta:'one'},{id:'ycb',bed:'double',meta:'two'}];
const zxBathDefs=[{id:'zx-bath1',key:'bath1'},{id:'zx-bath2',key:'bath2'}];
const zxCommonDefs=[{id:'zx-entry',key:'entry'},{id:'zx-living',key:'living'},{id:'zx-dining',key:'dining'},{id:'zx-kitchen',key:'kitchen'},{id:'zx-laundry',key:'laundry'}];
const ycBathDefs=[{id:'yc-bath1',key:'bathYC'}];
const ycCommonDefs=[{id:'yc-entry',key:'entry'},{id:'yc-living',key:'living'},{id:'yc-dining',key:'dining'},{id:'yc-kitchen',key:'kitchen'},{id:'yc-laundry',key:'laundry'}];

let currentLang='zh';

// per-slot photo store: id -> [base64, ...]
const photoStore={};

// ── Auto-compress images (max 1200px, quality 0.82) ──
function compressImage(file, cb){
  const MAX=1200, Q=0.82;
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    URL.revokeObjectURL(url);
    let w=img.width, h=img.height;
    if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',Q));
  };
  img.src=url;
}
function compressAndStore(files, id, done){
  if(!photoStore[id])photoStore[id]=[];
  let n=0;
  files.forEach(f=>{
    compressImage(f, b64=>{
      photoStore[id].push(b64);
      n++;if(n===files.length)done();
    });
  });
}



// ── lightbox state ──
let lbId=null, lbCur=0, lbLabel='';
const lbEl=document.getElementById('lightbox');
const lbImg=document.getElementById('lb-img');
const lbCounter=document.getElementById('lb-counter');
const lbDots=document.getElementById('lb-dots');
const lbTitle=document.getElementById('lb-title');
const lbAddBtn=document.getElementById('lb-add');
const lbFile=document.getElementById('lb-file');

function openLightbox(id,label,startIdx){
  lbId=id; lbLabel=label;
  lbCur=startIdx||0;
  lbEl.classList.add('open');
  document.body.style.overflow='hidden';
  lbRender();
}
function closeLightbox(){
  lbEl.classList.remove('open');
  document.body.style.overflow='';
  lbId=null;
}
function lbRender(){
  const photos=photoStore[lbId]||[];
  lbImg.src=photos[lbCur]||'';
  lbTitle.textContent=lbLabel;
  lbCounter.textContent=(lbCur+1)+' / '+photos.length;
  lbDots.innerHTML='';
  photos.forEach((_,i)=>{
    const d=document.createElement('button');d.className='lb-dot'+(i===lbCur?' active':'');
    d.onclick=()=>{lbCur=i;lbRender()};lbDots.appendChild(d);
  });
  lbAddBtn.textContent=i18n[currentLang]['lb-add'];
}
function lbGo(dir){
  const photos=photoStore[lbId]||[];
  lbCur=(lbCur+dir+photos.length)%photos.length;
  lbRender();
}
// swipe on lightbox
let lbTx=0;
lbEl.addEventListener('touchstart',e=>{lbTx=e.touches[0].clientX},{passive:true});
lbEl.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-lbTx;if(Math.abs(dx)>40)lbGo(dx<0?1:-1)},{passive:true});
document.addEventListener('keydown',e=>{if(!lbEl.classList.contains('open'))return;if(e.key==='ArrowLeft')lbGo(-1);if(e.key==='ArrowRight')lbGo(1);if(e.key==='Escape')closeLightbox()});

function lbAddPhotos(){lbFile.click()}
lbFile.addEventListener('change',e=>{
  const files=Array.from(e.target.files);if(!files.length||!lbId)return;
  compressAndStore(files,lbId,()=>{
    lbCur=photoStore[lbId].length-1;
    lbRender();refreshCover(lbId);
  });
  lbFile.value='';
});

function refreshCover(id){
  const zone=document.getElementById('cov-'+id);if(!zone)return;
  const photos=photoStore[id]||[];
  const img=zone.querySelector('.cover-img');
  const count=zone.querySelector('.photo-count');
  if(photos.length>0){
    img.src=photos[0];
    img.onload=()=>{img.classList.add('loaded')};
    zone.classList.add('has-photos');
    count.textContent=photos.length+'張';
  }
}

function makeSlot(id, label, isShared){
  photoStore[id]=photoStore[id]||[];
  const zoneClass=isShared?'shared-cover':'cover-zone';
  const zone=document.createElement('div');
  zone.className=zoneClass;zone.id='cov-'+id;

  const img=document.createElement('img');img.className='cover-img';img.alt=label;
  const countBadge=document.createElement('div');countBadge.className='photo-count';

  const empty=document.createElement('div');empty.className='cover-empty';
  const icon=document.createElement('div');icon.className='upload-icon';icon.textContent='+';
  const txt=document.createElement('div');txt.className='upload-text up-t';txt.textContent=i18n[currentLang][isShared?'btn-upload':'btn-upload'];
  empty.appendChild(icon);empty.appendChild(txt);

  const hover=document.createElement('div');hover.className='cover-hover';
  const btnUp=document.createElement('button');btnUp.className='btn-upload bup-t';btnUp.textContent=i18n[currentLang]['btn-upload'];
  const btnView=document.createElement('button');btnView.className='btn-view bview-t';btnView.textContent=i18n[currentLang]['btn-view'];
  hover.appendChild(btnUp);hover.appendChild(btnView);

  const fileInput=document.createElement('input');fileInput.type='file';fileInput.accept='image/*';fileInput.multiple=true;fileInput.id='file-'+id;

  zone.appendChild(img);zone.appendChild(countBadge);zone.appendChild(empty);zone.appendChild(hover);zone.appendChild(fileInput);

  // upload via button
  btnUp.addEventListener('click',e=>{e.stopPropagation();fileInput.click()});
  // view via button or zone click (when has photos)
  function doView(e){
    e.stopPropagation();
    const photos=photoStore[id]||[];
    if(photos.length>0){openLightbox(id,label,0);}
    else{fileInput.click();}
  }
  btnView.addEventListener('click',doView);
  zone.addEventListener('click',e=>{
    if(e.target===btnUp||e.target===btnView)return;
    doView(e);
  });

  fileInput.addEventListener('change',ev=>{
    const files=Array.from(ev.target.files);if(!files.length)return;
    compressAndStore(files,id,()=>refreshCover(id));
    fileInput.value='';
  });

  // drag-drop
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.style.outline='2px dashed #7a9e7e'});
  zone.addEventListener('dragleave',()=>zone.style.outline='');
  zone.addEventListener('drop',e=>{
    e.preventDefault();zone.style.outline='';
    const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
    if(!files.length)return;
    compressAndStore(files,id,()=>refreshCover(id));
  });

  return zone;
}

function buildRoomCard(def,roomIdx,lang){
  const card=document.createElement('div');card.className='room-card';
  const name=roomNames[lang][roomIdx];
  const slot=makeSlot(def.id,name,false);
  const info=document.createElement('div');info.className='room-info';
  info.innerHTML=`<div class="room-name rn-t">${name}</div><div class="room-meta rm-t">${metaNames[lang][def.meta]}</div><div class="bed-badge bd-t">${bedNames[lang][def.bed]}</div>`;
  card.appendChild(slot);card.appendChild(info);
  return card;
}

function buildSharedCard(def,lang){
  const card=document.createElement('div');card.className='shared-card';
  const label=sharedNames[lang][def.key];
  const slot=makeSlot(def.id,label,true);
  const lbl=document.createElement('div');lbl.className='shared-label sl-t';lbl.textContent=label;
  card.appendChild(slot);card.appendChild(lbl);
  return card;
}

function populateAll(lang){
  ['grid-zx','shared-zx-bath','shared-zx-common','grid-yc','shared-yc-bath','shared-yc-common'].forEach(id=>{const g=document.getElementById(id);if(g)g.innerHTML=''});
  document.getElementById('grid-zx').append(...zxRoomDefs.map((d,i)=>buildRoomCard(d,i,lang)));
  document.getElementById('shared-zx-bath').append(...zxBathDefs.map(d=>buildSharedCard(d,lang)));
  document.getElementById('shared-zx-common').append(...zxCommonDefs.map(d=>buildSharedCard(d,lang)));
  document.getElementById('grid-yc').append(...ycRoomDefs.map((d,i)=>buildRoomCard(d,i+4,lang)));
  document.getElementById('shared-yc-bath').append(...ycBathDefs.map(d=>buildSharedCard(d,lang)));
  document.getElementById('shared-yc-common').append(...ycCommonDefs.map(d=>buildSharedCard(d,lang)));
}

function setLang(lang,btn){
  currentLang=lang;
  const d=i18n[lang];
  document.documentElement.lang=d.lang;document.body.className='lang-'+lang;
  document.getElementById('save-hint').innerHTML=d['save-hint'];
  document.getElementById('btn-save').textContent=d['save-btn'];
  document.getElementById('t-tag').textContent=d['t-tag'];
  document.getElementById('t-h1').innerHTML=d['t-h1'];
  document.getElementById('t-hero-p').textContent=d['t-hero-p'];
  document.querySelectorAll('[data-key]').forEach(el=>{const k=el.getAttribute('data-key');if(d[k]!==undefined)el.textContent=d[k]});
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');
  const allRoomDefs=[...zxRoomDefs.map((r,i)=>({...r,idx:i})),...ycRoomDefs.map((r,i)=>({...r,idx:i+4}))];
  allRoomDefs.forEach(def=>{
    const card=document.getElementById('cov-'+def.id)?.closest('.room-card');if(!card)return;
    card.querySelector('.rn-t').textContent=roomNames[lang][def.idx];
    card.querySelector('.rm-t').textContent=metaNames[lang][def.meta];
    card.querySelector('.bd-t').textContent=bedNames[lang][def.bed];
    card.querySelector('.bup-t').textContent=d['btn-upload'];
    card.querySelector('.bview-t').textContent=d['btn-view'];
    card.querySelector('.up-t').textContent=d['btn-upload'];
  });
  [...zxBathDefs,...zxCommonDefs,...ycBathDefs,...ycCommonDefs].forEach(def=>{
    const card=document.getElementById('cov-'+def.id)?.closest('.shared-card');if(!card)return;
    card.querySelector('.sl-t').textContent=sharedNames[lang][def.key];
    card.querySelector('.bup-t').textContent=d['btn-upload'];
    card.querySelector('.bview-t').textContent=d['btn-view'];
    card.querySelector('.up-t').textContent=d['btn-upload'];
  });
  if(lbEl.classList.contains('open'))lbAddBtn.textContent=d['lb-add'];
}

populateAll('zh');

function showToast(msg,ms=2200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms)}

function saveWithPhotos(){
  const btn=document.getElementById('btn-save');const d=i18n[currentLang];
  btn.disabled=true;btn.textContent=d['save-processing'];
  showToast(d['save-embedding'],3000);
  setTimeout(()=>{
    try{
      const clone=document.documentElement.cloneNode(true);
      clone.querySelector('#save-bar')?.remove();clone.querySelector('#toast')?.remove();
      const html='<!DOCTYPE html>\n'+clone.outerHTML;
      const blob=new Blob([html],{type:'text/html;charset=utf-8'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='index.html';a.click();
      showToast(d['save-done']);
    }catch(err){showToast(d['save-fail']);console.error(err)}
    btn.disabled=false;btn.textContent=d['save-btn'];
  },400);
}
</script>
